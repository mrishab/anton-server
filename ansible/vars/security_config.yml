---
# Security Configuration
## SSH Configuration
ssh_port: 22
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_allow_groups: "admin sudo brewcraft"
ssh_challenge_response_authentication: "no"
ssh_pubkey_authentication: "yes"

# UFW Firewall Rules - Restricted to SSH and Monitoring
ufw_default_incoming: "deny"
ufw_default_outgoing: "allow"

ufw_rules:
  - { rule: "allow", port: "22", proto: "tcp", comment: "SSH" }
  - { rule: "allow", port: "9100", proto: "tcp", comment: "Node Exporter" }

# Fail2Ban Configuration
fail2ban_bantime: "10m"
fail2ban_findtime: "10m"
fail2ban_maxretry: 6

# Fail2Ban Jails
fail2ban_jails:
  - name: "ssh"
    enabled: true
    port: "ssh"
    filter: "sshd"
    logpath: "/var/log/auth.log"

# Additional Security Packages
security_packages:
  - fail2ban
  - ufw
  - unattended-upgrades
