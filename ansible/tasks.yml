# Core tasks for Anton Server
- name: Add Docker's official GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  apt_repository:
    repo: "deb [arch={{ docker_repo_arch | default('amd64') }}] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install packages
  apt:
    name: "{{ system_packages }}"
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Create symlink for batcat to bat
  file:
    src: /usr/bin/batcat
    dest: /usr/bin/bat
    state: link
    force: yes
  ignore_errors: yes

- name: Ensure Docker is started
  service:
    name: docker
    state: started
    enabled: yes

- name: Load host-specific secrets
  include_vars:
    file: "vars/secrets/{{ inventory_hostname }}.yml"
  failed_when: false

- name: Ensure user groups exist
  group:
    name: "{{ item.1 }}"
    state: present
  with_subelements:
    - "{{ users }}"
    - groups

- name: Manage users
  user:
    name: "{{ item.name }}"
    groups: "{{ item.groups | default([]) }}"
    password: "{{ (user_passwords | default({}))[item.name] | default(omit) }}"
    append: yes
    shell: /bin/bash
    create_home: yes
    non_unique: yes
  loop: "{{ users }}"

- name: Set up authorized keys for users
  authorized_key:
    user: "{{ item.name }}"
    state: present
    key: "{{ item.public_key }}"
  when: item.public_key is defined
  loop: "{{ users }}"

- name: Ensure storage mount points exist
  file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default(primary_user) }}"
    group: "{{ item.group | default(primary_user) }}"
    mode: "0755"
  loop: "{{ filesystems }}"
  when: item.path not in ["/", "none"]

- name: Create backup directories
  file:
    path: "{{ item.0.path }}{{ item.1 }}"
    state: directory
    owner: "{{ item.0.backup_owner | default(item.0.owner) | default(primary_user) }}"
    group: "{{ item.0.backup_group | default(item.0.group) | default(primary_user) }}"
    mode: "0755"
  with_subelements:
    - "{{ filesystems }}"
    - backups
    - skip_missing: true

- name: Configure mdadm monitoring and homehost
  lineinfile:
    path: /etc/mdadm/mdadm.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    create: yes
  loop:
    - {
        regexp: "^MAILADDR",
        line: "MAILADDR {{ storage_settings.monitoring.email }}",
      }
    - {
        regexp: "^HOMEHOST",
        line: "HOMEHOST {{ storage_settings.monitoring.homehost }}",
      }

- name: Configure storage mounts in fstab
  mount:
    path: "{{ item.path }}"
    src: "{{ item.source }}"
    fstype: "{{ item.fstype }}"
    opts: "{{ item.options | default('defaults') }}"
    state: present
  loop: "{{ filesystems }}"
  when:
    - item.source is defined
    - item.path != "/"
    - item.fstype != "swap"

- name: Apply sysctl settings
  sysctl:
    name: "{{ item.key }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop: "{{ sysctl_settings | dict2items }}"

- name: Configure SSH
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - {
        regexp: "^#?PermitRootLogin",
        line: "PermitRootLogin {{ ssh_permit_root_login }}",
      }
    - {
        regexp: "^#?PasswordAuthentication",
        line: "PasswordAuthentication {{ ssh_password_authentication }}",
      }
    - {
        regexp: "^#?PubkeyAuthentication",
        line: "PubkeyAuthentication {{ ssh_pubkey_authentication }}",
      }
    - {
        regexp: "^#?ChallengeResponseAuthentication",
        line: "ChallengeResponseAuthentication {{ ssh_challenge_response_authentication }}",
      }
    - { regexp: "^#?AllowGroups", line: "AllowGroups {{ ssh_allow_groups }}" }
  notify: restart ssh

- name: Configure UFW rules
  ufw:
    rule: "{{ item.rule }}"
    port: "{{ item.port }}"
    proto: "{{ item.proto | default('tcp') }}"
  loop: "{{ ufw_rules }}"

- name: Enable UFW
  ufw:
    state: enabled

- name: Configure Fail2Ban
  template:
    src: templates/fail2ban-jail.local.j2
    dest: /etc/fail2ban/jail.local
  notify: restart fail2ban

- name: Manage Fail2Ban service
  service:
    name: fail2ban
    state: started
    enabled: yes

- name: Enable Ubuntu Pro (Expanded Security Maintenance)
  command: pro attach {{ ubuntu_pro_token }}
  args:
    creates: /var/lib/ubuntu-advantage/private/machine-token.json
  when: ubuntu_pro_token is defined

- name: Configure periodic apt updates and upgrades
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Download-Upgradeable-Packages "1";
      APT::Periodic::AutocleanInterval "7";
      APT::Periodic::Unattended-Upgrade "1";

- name: Configure unattended-upgrades settings (autoremove and origins)
  copy:
    dest: /etc/apt/apt.conf.d/51unattended-upgrades-custom
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}";
          "${distro_id}:${distro_codename}-security";
          "${distro_id}ESMApps:${distro_codename}-apps-security";
          "${distro_id}ESM:${distro_codename}-infra-security";
          "${distro_id}:${distro_codename}-updates";
      };
      Unattended-Upgrade::Remove-Unused-Kernel-Packages "true";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";

- name: Setup Node Exporter
  block:
    - name: Create node_exporter group
      group:
        name: "{{ node_exporter_group }}"
        state: present
        system: yes

    - name: Create node_exporter user
      user:
        name: "{{ node_exporter_user }}"
        group: "{{ node_exporter_group }}"
        shell: /bin/false
        system: yes
        create_home: no
        state: present

    - name: Download and install node_exporter
      unarchive:
        src: "https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}.tar.gz"
        dest: /tmp
        remote_src: yes
      check_mode: no

    - name: Copy binary
      copy:
        src: "/tmp/node_exporter-{{ node_exporter_version }}.linux-{{ node_exporter_arch }}/node_exporter"
        dest: /usr/local/bin/node_exporter
        mode: "0755"
        remote_src: yes

    - name: Create systemd service
      copy:
        dest: /etc/systemd/system/node_exporter.service
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target

          [Service]
          User=node_exporter
          Group=node_exporter
          Type=simple
          ExecStart=/usr/local/bin/node_exporter
          Restart=always

          [Install]
          WantedBy=multi-user.target

    - name: Start Node Exporter
      service:
        name: node_exporter
        state: started
        enabled: yes
